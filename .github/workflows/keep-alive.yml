name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf "https://shift-management-app-gyp2.onrender.com/health" && echo "Backend is awake" || echo "Ping failed"
